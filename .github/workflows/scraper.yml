name: 🤖 Actualizar Eventos Madrid

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      motivo:
        description: 'Por que ejecutas el scraper'
        required: false
        default: 'Actualización manual'

jobs:
  scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 geopy python-dateutil

      - name: Ejecutar scraper
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}
        run: |
          cd scraper
          python scraper.py

      - name: Guardar cambios
        run: |
          git config --local user.email "scraper@eventosmadrid.com"
          git config --local user.name "EventosMadrid Bot"
          git add data/eventos.json
          git diff --staged --quiet || git commit -m "🤖 Eventos actualizados $(date '+%Y-%m-%d')"
          git push
