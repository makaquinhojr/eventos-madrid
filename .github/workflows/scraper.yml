name: 🤖 Actualizar Eventos Madrid

on:
  schedule:
    - cron: '0 8 * * 1'   # Lunes a las 8:00 UTC
  workflow_dispatch:
    inputs:
      motivo:
        description: 'Por qué ejecutas el scraper'
        required: false
        default: 'Actualización manual'

jobs:
  scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 geopy python-dateutil pip-audit
          pip-audit

      - name: 🤖 Ejecutar scraper
        env:
          TICKETMASTER_KEY: ${{ secrets.TICKETMASTER_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          cd scraper
          python scraper.py

      - name: 💾 Guardar cambios
        run: |
          git config --local user.email "scraper@eventosmadrid.com"
          git config --local user.name "EventosMadrid Bot"
          git add data/eventos.json
          if git diff --staged --quiet; then
            echo "ℹ️ No hay cambios nuevos en eventos.json"
          else
            git commit -m "🤖 Eventos actualizados $(date '+%Y-%m-%d %H:%M')"
            git push
            echo "✅ Cambios subidos al repositorio"
          fi