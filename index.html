<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>EventosMadrid - Mapa de eventos</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
    <div class="loader-contenido">
        <div class="loader-emoji">🎉</div>
        <h2 class="loader-titulo">EventosMadrid</h2>
        <p class="loader-subtitulo">Cargando eventos...</p>
        <div class="loader-barra">
            <div class="loader-progreso" id="loader-progreso"></div>
        </div>
        <p class="loader-count" id="loader-count"></p>
    </div>
</div>

<!-- HEADER -->
<header class="top-bar">
    <div class="logo">
        <div class="logo-icon">🎉</div>
        EventosMadrid
    </div>
    <div class="top-bar-actions">
        <button class="hoy-badge" id="hoy-badge" style="display:none">
            <span class="hoy-badge-dot"></span>
            <span id="hoy-badge-count">0</span> hoy
        </button>
        <button class="btn-lugares active" id="btn-toggle-lugares"
                title="Mostrar/ocultar lugares de interés">
            <i class="fas fa-landmark"></i>
            <span class="desktop-only">Lugares</span>
        </button>
        <button class="stats-toggle" id="stats-toggle">
            <i class="fas fa-chart-bar"></i>
            <span class="desktop-only">Stats</span>
        </button>
        <button class="theme-toggle" id="theme-toggle">
            <i class="fas fa-sun"></i>
        </button>
        <div class="event-counter" id="event-count">0</div>
    </div>
</header>

<!-- Toggle de vistas -->
<div class="view-toggle">
    <button class="view-btn active" id="view-map-btn">
        <i class="fas fa-map"></i> Mapa
    </button>
    <button class="view-btn" id="view-list-btn">
        <i class="fas fa-list"></i> Lista
    </button>
</div>

<!-- Botón geolocalización -->
<button class="btn-geolocate" id="btn-geolocate">
    <i class="fas fa-location-arrow"></i>
</button>

<!-- Vista Mapa -->
<div id="map" class="view-container active"></div>

<!-- Vista Lista -->
<div id="list-view" class="view-container">
    <div class="list-container">
        <div class="list-header">
            <h2>Eventos</h2>
            <div class="list-sort">
                <label>Ordenar:</label>
                <select id="sort-by">
                    <option value="date">📅 Fecha</option>
                    <option value="name">🔤 Nombre</option>
                    <option value="type">🎭 Tipo</option>
                    <option value="distance">📍 Distancia</option>
                </select>
            </div>
        </div>
        <div id="events-list" class="events-list"></div>

        <!-- NUEVA SECCIÓN: Lugares de interés -->
        <div class="lugares-section" id="lugares-section">
            <div class="lugares-header" id="lugares-header">
                <h2>🏛️ Lugares de Interés</h2>
                <button class="lugares-toggle-btn" id="lugares-toggle-btn">
                    <i class="fas fa-chevron-up"></i>
                </button>
            </div>
            <div id="lugares-list" class="lugares-list"></div>
        </div>
    </div>
</div>

<!-- BOTÓN FLOTANTE FILTROS -->
<button class="fab-filters" id="fab-filters">
    <i class="fas fa-sliders-h"></i>
    <span>Filtros</span>
</button>

<!-- PANEL FILTROS -->
<aside class="filters-panel" id="filters-panel">
    <div class="panel-header">
        <h2>Filtros</h2>
        <button class="close-panel" id="close-panel">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <div class="panel-content">

        <!-- BÚSQUEDA -->
        <div class="filter-section">
            <input
                type="text"
                id="search"
                class="search-box"
                placeholder="🔍 Buscar eventos, lugares, zonas..."
            >
        </div>

        <!-- CUÁNDO -->
        <div class="filter-section">
            <label class="filter-label">Cuándo</label>
            <select id="filtro-fecha" class="filter-select">
                <option value="todos">Todos</option>
                <option value="hoy">Hoy</option>
                <option value="finde">Este fin de semana</option>
                <option value="semana">Próximos 7 días</option>
                <option value="mes">Este mes</option>
            </select>
        </div>

        <!-- ZONA -->
        <div class="filter-section">
            <label class="filter-label">Zona</label>
            <select id="filtro-zona" class="filter-select">
                <option value="todas">📍 Toda la Comunidad</option>
                <optgroup label="🏙️ Madrid Capital">
                    <option value="Centro">Centro</option>
                    <option value="Arganzuela">Arganzuela</option>
                    <option value="Retiro">Retiro</option>
                    <option value="Salamanca">Salamanca</option>
                    <option value="Chamartín">Chamartín</option>
                    <option value="Tetuán">Tetuán</option>
                    <option value="Chamberí">Chamberí</option>
                    <option value="Fuencarral">Fuencarral</option>
                    <option value="Moncloa">Moncloa</option>
                    <option value="Latina">Latina</option>
                    <option value="Carabanchel">Carabanchel</option>
                    <option value="Usera">Usera</option>
                    <option value="Puente de Vallecas">Vallecas</option>
                    <option value="Moratalaz">Moratalaz</option>
                    <option value="Ciudad Lineal">Ciudad Lineal</option>
                    <option value="Hortaleza">Hortaleza</option>
                    <option value="Villaverde">Villaverde</option>
                    <option value="Villa de Vallecas">Villa de Vallecas</option>
                    <option value="Vicálvaro">Vicálvaro</option>
                    <option value="San Blas">San Blas</option>
                    <option value="Barajas">Barajas</option>
                </optgroup>
                <optgroup label="🌆 Municipios">
                    <option value="Getafe">Getafe</option>
                    <option value="Leganés">Leganés</option>
                    <option value="Alcorcón">Alcorcón</option>
                    <option value="Móstoles">Móstoles</option>
                    <option value="Fuenlabrada">Fuenlabrada</option>
                    <option value="Alcalá de Henares">Alcalá de Henares</option>
                    <option value="Torrejón de Ardoz">Torrejón de Ardoz</option>
                    <option value="Alcobendas">Alcobendas</option>
                    <option value="Las Rozas">Las Rozas</option>
                    <option value="Pozuelo">Pozuelo</option>
                    <option value="Majadahonda">Majadahonda</option>
                    <option value="Collado Villalba">Collado Villalba</option>
                    <option value="Tres Cantos">Tres Cantos</option>
                    <option value="San Sebastián de los Reyes">San Sebastián de los Reyes</option>
                    <option value="Coslada">Coslada</option>
                    <option value="Rivas Vaciamadrid">Rivas Vaciamadrid</option>
                    <option value="Aranjuez">Aranjuez</option>
                    <option value="Valdemoro">Valdemoro</option>
                    <option value="Parla">Parla</option>
                    <option value="Torrelodones">Torrelodones</option>
                    <option value="Boadilla del Monte">Boadilla del Monte</option>
                    <option value="Arganda del Rey">Arganda del Rey</option>
                </optgroup>
            </select>
        </div>

        <!-- TIPO DE EVENTO -->
        <div class="filter-section">
            <label class="filter-label">Tipo de Evento</label>
            <div class="filter-chips">
                <label class="chip">
                    <input type="checkbox" value="concierto" checked>
                    <span class="chip-content concierto">🎵 Conciertos</span>
                </label>
                <label class="chip">
                    <input type="checkbox" value="fiesta" checked>
                    <span class="chip-content fiesta">🎪 Fiestas</span>
                </label>
                <label class="chip">
                    <input type="checkbox" value="mercado" checked>
                    <span class="chip-content mercado">🛍️ Mercados</span>
                </label>
                <label class="chip">
                    <input type="checkbox" value="cultural" checked>
                    <span class="chip-content cultural">🎭 Cultural</span>
                </label>
                <label class="chip">
                    <input type="checkbox" value="gastronomia" checked>
                    <span class="chip-content gastronomia">🍽️ Gastro</span>
                </label>
                <label class="chip">
                    <input type="checkbox" value="deporte" checked>
                    <span class="chip-content deporte">⚽ Deportes</span>
                </label>
                <label class="chip">
                    <input type="checkbox" value="infantil" checked>
                    <span class="chip-content infantil">👶 Infantil</span>
                </label>
            </div>
        </div>

        <!-- ✅ LUGARES DE INTERÉS (MOVIDO AQUÍ - DEBAJO DE TIPO) -->
        <div class="filter-section filter-section-lugares">
            <label class="filter-label lugares-label">
                <span>🏛️ Lugares de Interés</span>
                <button class="lugares-collapse-btn" id="lugares-collapse-btn" type="button">
                    <i class="fas fa-chevron-up"></i>
                </button>
            </label>
            
            <!-- Checkbox "Seleccionar todos" -->
            <div class="lugares-select-all">
                <label class="chip">
                    <input type="checkbox" id="lugares-select-all" checked>
                    <span class="chip-content lugares-all">✓ Todos los lugares</span>
                </label>
            </div>

            <!-- Contenedor colapsable de categorías -->
            <div class="lugares-categorias" id="lugares-categorias">
                <div class="filter-chips">
                    <label class="chip">
                        <input type="checkbox" class="lugar-categoria-cb" value="museo" checked>
                        <span class="chip-content lugar-museo">🏛️ Museos</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" class="lugar-categoria-cb" value="monumento" checked>
                        <span class="chip-content lugar-monumento">🗿 Monumentos</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" class="lugar-categoria-cb" value="teatro" checked>
                        <span class="chip-content lugar-teatro">🎭 Teatros</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" class="lugar-categoria-cb" value="sala" checked>
                        <span class="chip-content lugar-sala">🎵 Salas</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" class="lugar-categoria-cb" value="parque" checked>
                        <span class="chip-content lugar-parque">🌳 Parques</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" class="lugar-categoria-cb" value="galeria" checked>
                        <span class="chip-content lugar-galeria">🖼️ Galerías</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" class="lugar-categoria-cb" value="mercado" checked>
                        <span class="chip-content lugar-mercado">🛍️ Mercados</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- PRECIO CHIPS -->
        <div class="filter-section">
            <label class="filter-label">Precio</label>
            <div class="filter-chips">
                <label class="chip">
                    <input type="checkbox" value="gratis" checked>
                    <span class="chip-content gratis">✓ Gratis</span>
                </label>
                <label class="chip">
                    <input type="checkbox" value="pago" checked>
                    <span class="chip-content pago">€ De pago</span>
                </label>
            </div>
        </div>

        <!-- PRECIO MÁXIMO SLIDER -->
        <div class="filter-section">
            <label class="filter-label">
                Precio máximo
                <span class="precio-valor" id="precio-valor-label">Cualquiera</span>
            </label>
            <input
                type="range"
                id="filtro-precio-max"
                class="precio-slider"
                min="0"
                max="100"
                value="100"
                step="5"
            >
            <div class="precio-marks">
                <span>Gratis</span>
                <span>50€</span>
                <span>100€+</span>
            </div>
        </div>

        <!-- LIMPIAR -->
        <button class="btn-clear" id="btn-clear">
            <i class="fas fa-redo"></i> Limpiar filtros
        </button>

    </div>
</aside>

<!-- PANEL STATS -->
<aside class="stats-panel" id="stats-panel">
    <div class="panel-header">
        <h2>Estadísticas</h2>
        <button class="close-panel" id="close-stats">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <div class="panel-content">
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-icon">🎵</div>
                <div class="stat-value" id="stat-conciertos">0</div>
                <div class="stat-name">Conciertos</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">🎪</div>
                <div class="stat-value" id="stat-fiestas">0</div>
                <div class="stat-name">Fiestas</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">🛍️</div>
                <div class="stat-value" id="stat-mercados">0</div>
                <div class="stat-name">Mercados</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">🎭</div>
                <div class="stat-value" id="stat-cultural">0</div>
                <div class="stat-name">Cultural</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">🍽️</div>
                <div class="stat-value" id="stat-gastronomia">0</div>
                <div class="stat-name">Gastro</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">⚽</div>
                <div class="stat-value" id="stat-deporte">0</div>
                <div class="stat-name">Deportes</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">👶</div>
                <div class="stat-value" id="stat-infantil">0</div>
                <div class="stat-name">Infantil</div>
            </div>
            <div class="stat-box highlight">
                <div class="stat-icon">✓</div>
                <div class="stat-value" id="stat-gratis">0</div>
                <div class="stat-name">Gratis</div>
            </div>
        </div>
    </div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="js/app.js"></script>
</body>
</html>
